spring:
  application:
    name: notification-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      max-poll-records: 100
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

resilience4j:
  retry:
    instances:
      slackNotification:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
      teamsNotification:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.opsbrain: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

notification:
  slack:
    enabled: ${NOTIFICATION_SLACK_ENABLED:true}
    channel: ${NOTIFICATION_SLACK_CHANNEL:incidents}
  teams:
    enabled: ${NOTIFICATION_TEAMS_ENABLED:true}
    channel: ${NOTIFICATION_TEAMS_CHANNEL:Incidents}

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /
