apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ayanchasrinivas/Enterprise-EFK-with-AWS-EKS
    targetRevision: main
    path: kubernetes/opsbrain
    kustomize:
      images:
      - notification-service:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: opsbrain
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
