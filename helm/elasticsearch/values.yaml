# Production Elasticsearch Helm values
# Chart: elastic/elasticsearch v8.5.1+
# https://github.com/elastic/helm-charts/tree/main/elasticsearch

clusterName: "elk-efk-prod"
nodeGroup: "master"

# Roles for this StatefulSet
roles:
  - master
  - data_hot
  - data_content
  - ingest

replicas: 3
minimumMasterNodes: 2

esMajorVersion: "8"
esVersion: "8.12.0"

image: "docker.elastic.co/elasticsearch/elasticsearch"
imageTag: "8.12.0"
imagePullPolicy: "IfNotPresent"

# Resource allocation: 50% RAM to JVM heap, rest to OS page cache
esJavaOpts: "-Xmx4g -Xms4g -XX:+UseG1GC -XX:G1HeapRegionSize=4m -XX:MaxGCPauseMillis=200"

resources:
  requests:
    cpu: "2000m"
    memory: "8Gi"
  limits:
    cpu: "4000m"
    memory: "10Gi"

# Persistent storage
volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "elasticsearch-hot"
  resources:
    requests:
      storage: 500Gi

# Node affinity: schedule on ES hot nodes only
tolerations:
  - key: "elk/elasticsearch"
    operator: "Equal"
    value: "hot"
    effect: "NoSchedule"

nodeSelector:
  "elk/role": "es-hot"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - elasticsearch-master
        topologyKey: kubernetes.io/hostname

# Security: enable TLS on both transport and HTTP layers
protocol: https
esConfig:
  elasticsearch.yml: |
    cluster.name: elk-efk-prod
    network.host: 0.0.0.0

    # Transport TLS (inter-node)
    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.verification_mode: certificate
    xpack.security.transport.ssl.certificate_authorities:
      - /usr/share/elasticsearch/config/certs/transport/ca.crt
    xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/certs/transport/tls.crt
    xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/certs/transport/tls.key

    # HTTP TLS
    xpack.security.http.ssl.enabled: true
    xpack.security.http.ssl.certificate_authorities:
      - /usr/share/elasticsearch/config/certs/http/ca.crt
    xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/certs/http/tls.crt
    xpack.security.http.ssl.key: /usr/share/elasticsearch/config/certs/http/tls.key

    # Security features
    xpack.security.enabled: true
    xpack.security.authc.token.enabled: true
    xpack.security.authc.api_key.enabled: true

    # ILM and monitoring
    xpack.monitoring.collection.enabled: true

    # Index lifecycle
    action.destructive_requires_name: true
    cluster.routing.allocation.disk.watermark.low: "85%"
    cluster.routing.allocation.disk.watermark.high: "90%"
    cluster.routing.allocation.disk.watermark.flood_stage: "95%"

    # Performance
    indices.memory.index_buffer_size: "20%"
    thread_pool.write.queue_size: 1000
    thread_pool.search.queue_size: 1000

secret:
  enabled: true
  password: ""  # Set via --set or external-secrets

# Mount cert-manager TLS secrets
extraVolumes:
  - name: elasticsearch-transport-certs
    secret:
      secretName: elasticsearch-transport-certs
  - name: elasticsearch-http-certs
    secret:
      secretName: elasticsearch-http-certs

extraVolumeMounts:
  - name: elasticsearch-transport-certs
    mountPath: /usr/share/elasticsearch/config/certs/transport
    readOnly: true
  - name: elasticsearch-http-certs
    mountPath: /usr/share/elasticsearch/config/certs/http
    readOnly: true

# init container to fix permissions
extraInitContainers:
  - name: fix-permissions
    image: busybox:1.36
    command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
    volumeMounts:
      - name: elasticsearch-master
        mountPath: /usr/share/elasticsearch/data
    securityContext:
      runAsUser: 0

# Pod Disruption Budget: keep at least 2 pods up during disruptions
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Service
service:
  type: ClusterIP
  httpPortName: https
  transportPortName: transport

# Readiness & liveness probes
readinessProbe:
  scheme: HTTPS
  path: /_cluster/health?local=true
  initialDelaySeconds: 90
  periodSeconds: 10
  successThreshold: 3
  failureThreshold: 3
  timeoutSeconds: 5

# Monitoring: expose metrics for Prometheus (optional)
extraContainers:
  - name: elasticsearch-exporter
    image: prometheuscommunity/elasticsearch-exporter:v1.7.0
    args:
      - "--es.uri=https://localhost:9200"
      - "--es.ssl-skip-verify"
      - "--es.all"
      - "--es.indices"
      - "--es.shards"
    ports:
      - containerPort: 9114
        name: metrics
    env:
      - name: ES_USERNAME
        value: elastic
      - name: ES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: elasticsearch-master-credentials
            key: password
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
