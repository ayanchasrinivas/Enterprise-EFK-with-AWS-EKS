apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
  labels:
    app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon       Off
        Flush        5
        Log_Level    warn
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On
        storage.path              /var/fluent-bit/state/flb-storage/
        storage.sync              normal
        storage.backlog.mem_limit 10M

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Exclude_Path      /var/log/containers/fluent-bit-*
        Parser            cri
        DB                /var/fluent-bit/state/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        storage.type      filesystem

    [INPUT]
        Name              systemd
        Tag               host.*
        Systemd_Filter    _SYSTEMD_UNIT=kubelet.service
        DB                /var/fluent-bit/state/systemd.db
        Read_From_Tail    On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude log /health|/healthz|/ready|/ping

    [FILTER]
        Name    record_modifier
        Match   kube.*
        Record  cluster elk-efk-prod
        Record  environment production

    [FILTER]
        Name      throttle
        Match     kube.*
        Rate      10000
        Window    300
        Interval  1s

    [OUTPUT]
        Name              es
        Match             kube.*
        Host              elasticsearch-master.logging.svc.cluster.local
        Port              9200
        HTTP_User         fluentbit_writer
        HTTP_Passwd       ${ES_PASSWORD}
        TLS               On
        TLS.verify        On
        TLS.ca_file       /fluent-bit/certs/ca.crt
        Data_Stream_Enable On
        Data_Stream_Name  logs
        Data_Stream_Dataset kubernetes.${kubernetes['namespace_name']}
        Data_Stream_Namespace production
        Retry_Limit       10
        Compress          gzip
        Workers           4

    [OUTPUT]
        Name              es
        Match             host.*
        Host              elasticsearch-master.logging.svc.cluster.local
        Port              9200
        HTTP_User         fluentbit_writer
        HTTP_Passwd       ${ES_PASSWORD}
        TLS               On
        TLS.ca_file       /fluent-bit/certs/ca.crt
        Data_Stream_Enable On
        Data_Stream_Name  logs
        Data_Stream_Dataset system.host
        Data_Stream_Namespace production
        Retry_Limit       10

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        nginx
        Format      regex
        Regex       ^(?<host>[^ ]*) [^ ]* (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)
        Time_Key    time
        Time_Format %d/%b/%Y:%H:%M:%S %z