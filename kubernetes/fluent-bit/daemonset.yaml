---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/path: "/api/v1/metrics/prometheus"
      prometheus.io/port: "2020"
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:3.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2020
              name: http
          env:
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluent-bit-secrets
                  key: ES_PASSWORD
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          
          livenessProbe:
            httpGet: 
              path: /
              port: http
            initialDelaySeconds: 30

          redinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
          
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
            - name: fluent-bit-certs
              mountPath: /fluent-bit/certs
              readOnly: true
            - name: state
              mountPath: /var/fluent-bit/state
    
    volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-config
      - name: fluent-bit-certs
        secret:
          secretName: elasticsearch-http-certs
      - name: state
        hostPath:
          path: /var/fluent-bit/state
          type: DirectoryOrCreate