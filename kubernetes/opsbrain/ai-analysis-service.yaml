apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-analysis
  namespace: opsbrain
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/opsbrain-bedrock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analysis-service
  namespace: opsbrain
  labels:
    app: ai-analysis-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-analysis-service
  template:
    metadata:
      labels:
        app: ai-analysis-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: ai-analysis
      containers:
        - name: ai-analysis-service
          image: <ECR_REGISTRY>/ai-analysis-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.opsbrain.svc.cluster.local:9092"
            - name: AWS_REGION
              value: "ap-south-1"
            - name: BEDROCK_MODEL_ID
              value: "anthropic.claude-opus-4-8"
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "1536Mi"
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 35
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: ai-analysis-service
  namespace: opsbrain
spec:
  type: ClusterIP
  selector:
    app: ai-analysis-service
  ports:
    - port: 80
      targetPort: 8083
...