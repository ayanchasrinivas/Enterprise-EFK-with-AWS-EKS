---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: opsbrain
data:
  application.yml: |
    spring:
      application:
        name: notification-service
      jpa:
        hibernate:
          ddl-auto: validate
      datasource:
        hikari:
          maximum-pool-size: 10
          minimum-idle: 2
      kafka:
        bootstrap-servers: kafka-cluster-kafka-bootstrap.kafka:9092
    management:
      endpoints:
        web:
          exposure:
            include: health,metrics,prometheus
    logging:
      level:
        root: INFO
        com.opsbrain: DEBUG
    server:
      port: 8082

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: opsbrain

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: opsbrain
  labels:
    app: notification-service
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: notification-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8082
          protocol: TCP
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: notification-db-secret
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: notification-db-secret
              key: port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: notification-db-secret
              key: database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: notification-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: notification-db-secret
              key: password
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka-cluster-kafka-bootstrap.kafka:9092
        - name: NOTIFICATION_SLACK_ENABLED
          value: "true"
        - name: NOTIFICATION_SLACK_CHANNEL
          value: incidents
        - name: NOTIFICATION_TEAMS_ENABLED
          value: "true"
        - name: NOTIFICATION_TEAMS_CHANNEL
          value: Incidents
        - name: SERVER_PORT
          value: "8082"
        - name: JAVA_OPTS
          value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - notification-service
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: opsbrain
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8082
    targetPort: http
    protocol: TCP
  selector:
    app: notification-service

---
apiVersion: autoscaling.k8s.io/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: opsbrain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: opsbrain
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notification-service
