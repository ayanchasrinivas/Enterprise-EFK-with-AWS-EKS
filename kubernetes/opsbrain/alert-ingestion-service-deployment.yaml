---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-ingestion-service
  namespace: opsbrain
  labels:
    app: alert-ingestion-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-ingestion-service
  template:
    metadata:
      labels:
        app: alert-ingestion-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: alert-ingestion-service
          image: <ECR_REGISTRY>/alert-ingestion-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.opsbrain.svc.cluster.local:9092"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyFileSystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: alert-ingestion-service
  namespace: opsbrain
spec:
  type: ClusterIP
  selector:
    app: alert-ingestion-service
  ports:
    - port: 80
      targetPort: 8081
...