---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: logging
  labels:
    app: logstash
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http-input
      port: 8080
      targetPort: 8080
    - name: tcp-input
      port: 5000
      targetPort: 5000
    - name: monitoring
      port: 9600
      targetPort: 9600
...