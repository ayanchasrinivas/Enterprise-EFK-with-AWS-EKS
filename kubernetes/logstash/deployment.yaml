---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: logging
  labels:
    app: logstash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      nodeSelector:
        elk/role: logging
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: beats
              containerPort: 5044
            - name: http-input
              containerPort: 8080
            - name: tcp-input
              containerPort: 5000
            - name: monitoring
              containerPort: 9600
          env:
            - name: LOGSTASH_ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logstash-secrets
                  key: esPassword
            - name: LOGSTASH_MONITOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: logstash-secrets
                  key: monitorPassword
            - name: LS_JAVA_OPTS
              value: "-Xms2g -Xmx2g -XX:+UseG1GC"
          
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "3000m"
              memory: "4Gi"
          
          redinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
          
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: pipelines-config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
            - name: certs
              mountPath: /usr/share/logstash/config/certs
              readOnly: true
            - name: data
              mountPath: /usr/share/logstash/data
          
      volumes:
        - name: config
          configMap:
            name: logstash-config
            items:
              - key: logstash.yml
                path: logstash.yml
        - name: pipelines-config
          configMap:
            name: logstash-config
            items:
              - key: pipelines.yml
                path: pipelines.yml
        - name: pipeline
          configMap:
            name: logstash-pipeline
        - name: certs
          secret:
            secretName: elasticsearch-http-certs
        - name: data
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: logstash-pdb
  namespace: logging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: logstash
...