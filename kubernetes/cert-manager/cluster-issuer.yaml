---
apiversion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ayanchasrinivas001@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
            role: arn:aws:iam::ACCOUNT_ID:role/cert-manager-route53
        selector:
          dnsZones:
            - ayanchasrinivas.space

      - http01:
          ingress:
            class: nginx
        selector:
          dnsNames:
            - kibana.ayanchasrinivas.space
            - elasticsearch.ayanchasrinivas.space
            - logstash.ayanchasrinivas.space
            - monitor.ayanchasrinivas.space
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ayanchasrinivas001@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx