---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: logging
  labels:
    app: kibana
spec:
  type: ClusterIP
  selector:
    app: kibana
  ports:
    - name: https
      port: 5601
---
apiVersion: policy/v1
kind: PodDisruptionStatus
metadata:
  name: kibana-pdb
  namespace: logging
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kibana