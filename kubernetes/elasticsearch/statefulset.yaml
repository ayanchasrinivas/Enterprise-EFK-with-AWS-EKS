---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-master
  namespace: logging
  labels:
    app: elasticsearch-master
spec:
  replicas: 3
  serviceName: elasticsearch-master-headless
  selector:
    matchLables:
      app: elasticsearch-master
  template:
    metadata:
      labels:
        app: elasticsearch-master
    spec:
      nodeSelector:
        elk/role: es-hot
      tolerations:
        - key: elk/elasticsearch
          operator: Equal
          value: hot
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - elasticsearch-master
              topologyKey: kubernetes.io/hostname
      
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
        - name: increase-vm-max-map
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9200
              name: https
            - containerPort: 9300
              name: transport
          env:
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: cluster.initial_master_nodes
              value: "elasticsearch-master-0,elasticsearch-master-1,elasticsearch-master-2"
            - name: discovery.seed_hosts
              value: "elasticsearch-master-headless"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-master-credentials
                  key: password
            - name: ES_JAVA_OPTS
              value: "-Xms4g -Xmx4g -XX:+UseG1GC"
            - name: node.roles
              value: "master,data_hot,data_content,ingest"
          
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
            limits:
              cpu: "4000m"
              memory: "10Gi"
          
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 10
            successThreshold: 3
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
            - name: config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: transport-certs
              mountPath: /usr/share/elasticsearch/config/certs/transport
              readOnly: true
            - name: http-certs
              mountPath: /usr/share/elasticsearch/config/certs/http
              readOnly: true


      volumes:
        - name: config
          configMap:
            name: elasticsearch-config
        - name: transport-certs
          secret:
            secretName: elasticsearch-transport-certs
        - name: http-certs
          secret:
            secretName: elasticsearch-http-certs
  
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: elasticsearch-hot
        resources:
          requests:
            storage: 100Gi
