version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch (for logging)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # Kibana (for log visualization)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0-1
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      xpack.encryptedSavedObjects.encryptionKey: "min-32-character-long-encryption-key-required"

  # Task API Service
  task-api:
    build:
      context: ./services/task-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tasks_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: info

  # Notification Worker Service
  notification-worker:
    build:
      context: ./services/notification-worker
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tasks_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - task-api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  default:
    name: task-app-network
